<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ad Campaign Tracker</title>
    <style>
      body{font-family:Arial,sans-serif;margin:0;background:#f5f7fb;color:#1f2937}
      .top{padding:12px 16px;background:#111827;color:#fff;position:sticky;top:0;z-index:10}
      .tabs{display:flex;flex-wrap:wrap;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid #e5e7eb}
      .tab{padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;cursor:pointer;font-size:13px;background:#fff}
      .tab.active{background:#111827;color:#fff;border-color:#111827}
      .wrap{padding:16px}
      .panel{display:none}
      .panel.active{display:block}
      .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
      .card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px}
      .muted{color:#6b7280;font-size:12px}
      .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;color:#fff}
      .b-level-campaign{background:#1d4ed8}.b-level-adset{background:#0891b2}.b-level-ad{background:#7c3aed}
      .b-prio-Urgent{background:#dc2626}.b-prio-Normal{background:#2563eb}.b-prio-Monitor{background:#4b5563}
      .b-prio-Default{background:#64748b}
      .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
      input,select,textarea,button{padding:8px;border:1px solid #d1d5db;border-radius:8px;font-size:13px}
      textarea{width:100%;min-height:90px}
      button{cursor:pointer;background:#111827;color:#fff}
      button.secondary{background:#fff;color:#111827}
      .bar{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}
      .bar>span{display:block;height:100%;background:#2563eb}
      .table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e7eb}
      .table th,.table td{border-bottom:1px solid #e5e7eb;padding:8px;font-size:12px;text-align:left}
      .empty{padding:20px;background:#fff;border:1px dashed #cbd5e1;border-radius:10px;color:#64748b}
    </style>
  </head>
  <body>
    <div class="top"><strong>Ad Campaign Tracker</strong> <span class="muted">(Internal Web App)</span></div>
    <div class="tabs" id="tabs"></div>
    <div class="wrap" id="content"></div>

    <script>
      const TAB_LIST = ['Dashboard','Rekomendasi','Brief','Periode','Alert','Hierarki','Analitik','AI','Import','Settings'];
      const STATE = {tab:'Dashboard',snapshot:null,priority:'Semua',compareRows:[],aiConfig:null,systemConfig:null,isAdmin:false,hierarchyCampaign:'ALL'};

      function fmt(n,d=2){n=Number(n||0);return n.toLocaleString('id-ID',{maximumFractionDigits:d,minimumFractionDigits:0})}
      function rp(n){return `Rp ${Number(n||0).toLocaleString('id-ID',{maximumFractionDigits:0})}`}
      function pct(n){return `${fmt(n,2)}%`}
      function levelCls(l){return l==='campaign'?'b-level-campaign':l==='adset'?'b-level-adset':'b-level-ad'}
      function prioCls(p){return p==='Urgent'||p==='Normal'||p==='Monitor' ? `b-prio-${p}` : 'b-prio-Default'}
      function num(n){return Number(n||0)}
      function isOffEntity(e){
        const m=e?.metrics||{};
        return num(m.spend)===0 && num(m.impressions)===0 && num(m.results)===0 && num(m.revenue)===0 && num(m.clicks)===0;
      }
      function isOffRow(r){
        r=r||{};
        return num(r.spend)===0 && num(r.impressions)===0 && num(r.results)===0 && num(r.revenue)===0;
      }
      function activeEntities(level){
        const rows=(STATE.snapshot?.entities||[]).filter(e=>!isOffEntity(e));
        return level ? rows.filter(e=>e.level===level) : rows;
      }
      function optimizationChecklist(e){
        const m=e?.metrics||{};
        const steps=[];

        if(num(m.spend) > 0 && num(m.roas) < 1){
          steps.push('Pause sementara 24 jam, evaluasi ulang hook, offer, dan audience sebelum diaktifkan lagi.');
        } else if (num(m.roas) >= 3){
          steps.push('Scale budget bertahap 20-30% per 24 jam sambil menjaga CPA agar tetap stabil.');
        }

        if(num(m.impressions) > 0 && num(m.ctr) < 0.8){
          steps.push('Optimasi creative: ganti thumbnail, perkuat 3 detik pertama, dan test minimal 3 hook baru.');
        }

        if(num(m.freq) >= 2.5){
          steps.push('Cegah fatigue: rotasi materi iklan, perluas audience, atau pisahkan audience overlap.');
        }

        if(num(m.results) > 0 && num(m.cpa) > 0 && num(m.roas) < 1.5){
          steps.push('Turunkan CPA dengan memperjelas CTA, pre-qualify audience, dan sinkronkan pesan iklan ke landing page.');
        }

        if(num(m.atcRate) > 0 && num(m.conversionRate) < 20){
          steps.push('Perbaiki funnel checkout: kecepatan halaman, trust element, dan simplifikasi form/step pembayaran.');
        }

        if(!steps.length){
          steps.push('Performa relatif stabil. Fokuskan optimasi pada eksperimen kreatif kecil dan monitoring harian.');
        }

        return steps;
      }
      function analyticOptimizationNote(e, metric){
        const m=e?.metrics||{};
        if(metric==='roas') return num(m.roas) < 1.5
          ? 'ROAS masih rendah. Prioritaskan perbaikan offer, kualitas traffic, dan kesesuaian pesan iklan-landing page.'
          : 'ROAS sehat. Pertahankan struktur yang menang lalu scale bertahap dengan kontrol frekuensi.';
        if(metric==='ctr') return num(m.ctr) < 1
          ? 'CTR rendah. Fokus pada angle/hook baru, visual lebih kontras, dan headline yang lebih spesifik manfaat.'
          : 'CTR baik. Lanjutkan A/B test ringan untuk menjaga momentum tanpa mengganggu pemenang utama.';
        if(metric==='cpa') return num(m.cpa) > 0
          ? 'Turunkan CPA dengan memperbaiki pre-qualifikasi audience dan mengurangi friksi setelah klik.'
          : 'CPA belum terbentuk jelas. Kumpulkan data tambahan sambil memastikan tracking event lengkap.';
        if(metric==='spend') return 'Audit alokasi budget: kurangi item boros ber-ROAS rendah dan pindahkan budget ke pemenang.';
        return num(m.cpm) > 60000
          ? 'CPM tinggi. Perluas audience, perbaiki relevansi iklan, dan cek overlap antar ad set.'
          : 'CPM masih wajar. Jaga kualitas traffic dan hindari overlap audience yang berlebihan.';
      }

      function gsr(fn,payload){
        return new Promise((resolve,reject)=>{
          google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn](payload||{});
        });
      }

      async function init(){
        renderTabs();
        // doGet() already ensures the spreadsheet schema before this HTML renders,
        // so avoid a second bootstrap call on the initial UI hot-path.
        await Promise.all([
          loadSnapshot(),
          loadAiConfig(),
          loadSystemConfig()
        ]);
        render();
      }

      async function loadSnapshot(){
        const r = await gsr('uiSnapshot');
        STATE.snapshot = r.data || {kpi:{},entities:[],thresholds:[],settings:[]};
      }

      async function loadAiConfig(){
        const r = await gsr('uiGetAiConfig');
        STATE.aiConfig = r.data || {provider:'builtin',has_openai_key:false,has_gemini_key:false,has_claude_key:false};
      }

      async function loadSystemConfig(){
        try {
          const r = await gsr('uiGetSystemConfigStatus');
          STATE.systemConfig = r.data || null;
          STATE.isAdmin = !!r.ok;
        } catch (e) {
          STATE.systemConfig = null;
          STATE.isAdmin = false;
        }
      }

      function renderTabs(){
        const el=document.getElementById('tabs');
        el.innerHTML=TAB_LIST.map(t=>`<button class="tab ${STATE.tab===t?'active':''}" onclick="switchTab('${t}')">${t}</button>`).join('');
      }
      function switchTab(t){STATE.tab=t;renderTabs();render()}

      function render(){
        const el=document.getElementById('content');
        const tabsNeedData=['Dashboard','Rekomendasi','Brief','Alert','Hierarki','Analitik'];
        const hasData=activeEntities().length>0;
        if((!STATE.snapshot || !hasData) && tabsNeedData.includes(STATE.tab)){
          el.innerHTML=`<div class='empty'>Tidak ada data aktif yang bisa ditampilkan. Jika nilai CSV semuanya 0, iklan dianggap <b>off</b> dan hasil disembunyikan. Silakan import data aktif di tab <b>Import</b>.</div>`;
          return;
        }
        if(STATE.tab==='Dashboard') return renderDashboard(el);
        if(STATE.tab==='Rekomendasi') return renderReco(el);
        if(STATE.tab==='Brief') return renderBrief(el);
        if(STATE.tab==='Periode') return renderPeriode(el);
        if(STATE.tab==='Alert') return renderAlert(el);
        if(STATE.tab==='Hierarki') return renderHierarki(el);
        if(STATE.tab==='Analitik') return renderAnalitik(el);
        if(STATE.tab==='AI') return renderAI(el);
        if(STATE.tab==='Import') return renderImport(el);
        if(STATE.tab==='Settings') return renderSettings(el);
      }

      function renderDashboard(el){
        const k=STATE.snapshot.kpi||{};
        const campaigns=activeEntities('campaign');
        const allActive=activeEntities();
        const max=Math.max(1,...campaigns.map(c=>num(c.metrics.roas)||0));
        const totalSpend=allActive.reduce((acc,e)=>acc+num(e.metrics.spend),0);
        const levelBreakdown={
          campaign:activeEntities('campaign').length,
          adset:activeEntities('adset').length,
          ad:activeEntities('ad').length
        };
        const urgencyBreakdown={
          Urgent:allActive.filter(e=>e.priority==='Urgent').length,
          Normal:allActive.filter(e=>e.priority==='Normal').length,
          Monitor:allActive.filter(e=>e.priority==='Monitor').length
        };
        const roasSegments=[
          {label:'ROAS < 1',count:allActive.filter(e=>num(e.metrics.roas)<1).length,color:'#dc2626'},
          {label:'ROAS 1 - 2',count:allActive.filter(e=>num(e.metrics.roas)>=1&&num(e.metrics.roas)<2).length,color:'#f59e0b'},
          {label:'ROAS 2 - 3',count:allActive.filter(e=>num(e.metrics.roas)>=2&&num(e.metrics.roas)<3).length,color:'#2563eb'},
          {label:'ROAS ≥ 3',count:allActive.filter(e=>num(e.metrics.roas)>=3).length,color:'#16a34a'}
        ];
        const maxRoasSeg=Math.max(1,...roasSegments.map(s=>s.count));
        const maxLevel=Math.max(1,levelBreakdown.campaign,levelBreakdown.adset,levelBreakdown.ad);
        const maxUrgency=Math.max(1,urgencyBreakdown.Urgent,urgencyBreakdown.Normal,urgencyBreakdown.Monitor);

        if(!allActive.length){
          el.innerHTML="<div class='empty'>Semua data saat ini bernilai 0 (iklan off), jadi dashboard tidak ditampilkan.</div>";
          return;
        }

        el.innerHTML=`
          <div class='grid'>
            <div class='card'><div class='muted'>Total Spend Aktif</div><b>${rp(totalSpend)}</b></div>
            <div class='card'><div class='muted'>Total Revenue</div><b>${rp(k.total_revenue)}</b></div>
            <div class='card'><div class='muted'>ROAS Keseluruhan</div><b>${fmt(k.roas_overall)}</b></div>
            <div class='card'><div class='muted'>Campaign Aktif</div><b>${levelBreakdown.campaign}</b></div>
            <div class='card'><div class='muted'>Ad Set Aktif</div><b>${levelBreakdown.adset}</b></div>
            <div class='card'><div class='muted'>Ad Aktif</div><b>${levelBreakdown.ad}</b></div>
            <div class='card'><div class='muted'>Item Urgent</div><b>${urgencyBreakdown.Urgent}</b></div>
            <div class='card'><div class='muted'>Alert</div><b>${k.alert_count||0}</b></div>
          </div>
          <h3>Visual Distribusi Data</h3>
          <div class='grid'>
            <div class='card'>
              <b>Komposisi Level Aktif</b>
              <div class='muted'>Campaign vs Ad Set vs Ad</div>
              <div style='margin-top:10px'>
                ${[
                  {label:'Campaign',val:levelBreakdown.campaign,color:'#1d4ed8'},
                  {label:'Ad Set',val:levelBreakdown.adset,color:'#0891b2'},
                  {label:'Ad',val:levelBreakdown.ad,color:'#7c3aed'}
                ].map(x=>`<div style='margin-bottom:8px'><div class='row'><span>${x.label}</span><span class='muted'>${x.val}</span></div><div class='bar'><span style='width:${Math.min(100,(x.val/maxLevel)*100)}%;background:${x.color}'></span></div></div>`).join('')}
              </div>
            </div>
            <div class='card'>
              <b>Prioritas Optimasi</b>
              <div class='muted'>Urgent, Normal, Monitor</div>
              <div style='margin-top:10px'>
                ${[
                  {label:'Urgent',val:urgencyBreakdown.Urgent,color:'#dc2626'},
                  {label:'Normal',val:urgencyBreakdown.Normal,color:'#2563eb'},
                  {label:'Monitor',val:urgencyBreakdown.Monitor,color:'#4b5563'}
                ].map(x=>`<div style='margin-bottom:8px'><div class='row'><span class='badge ${prioCls(x.label)}'>${x.label}</span><span class='muted'>${x.val}</span></div><div class='bar'><span style='width:${Math.min(100,(x.val/maxUrgency)*100)}%;background:${x.color}'></span></div></div>`).join('')}
              </div>
            </div>
          </div>
          <div class='card' style='margin-top:10px'>
            <b>Distribusi Kualitas ROAS</b>
            <div class='muted'>Semakin banyak di ROAS tinggi, semakin sehat performa akun</div>
            <div style='margin-top:10px'>
              ${roasSegments.map(s=>`<div style='margin-bottom:8px'><div class='row'><span>${s.label}</span><span class='muted'>${s.count} item</span></div><div class='bar'><span style='width:${Math.min(100,(s.count/maxRoasSeg)*100)}%;background:${s.color}'></span></div></div>`).join('')}
            </div>
          </div>
          <h3>ROAS per Campaign (Aktif)</h3>
          ${(campaigns||[]).map(c=>`<div class='card'><div class='row'><strong>${c.name}</strong><span class='muted'>ROAS ${fmt(c.metrics.roas)}</span></div><div class='bar'><span style='width:${Math.min(100,(c.metrics.roas/max)*100)}%'></span></div></div>`).join('')}
        `;
      }

      function renderReco(el){
        const rows=activeEntities().filter(e=>STATE.priority==='Semua'||e.priority===STATE.priority);
        if(!rows.length){
          el.innerHTML=`<div class='empty'>Tidak ada data aktif untuk filter ini. Item dengan nilai CSV 0 disembunyikan (iklan off).</div>`;
          return;
        }
        el.innerHTML=`
          <div class='row'>
            <label>Filter priority</label>
            <select onchange="STATE.priority=this.value;renderReco(document.getElementById('content'))">
              ${['Semua','Urgent','Normal','Monitor'].map(p=>`<option ${STATE.priority===p?'selected':''}>${p}</option>`).join('')}
            </select>
          </div>
          ${rows.map(e=>`<div class='card'>
            <div class='row'>
              <b>${e.name}</b>
              <span class='badge ${levelCls(e.level)}'>${e.level==='campaign'?'Campaign':e.level==='adset'?'Ad Set':'Ad'}</span>
              <span class='badge b-prio-${e.priority}'>${e.priority}</span>
            </div>
            <div class='muted'>${e.status} • Alert: ${(e.alerts||[]).length}</div>
            <div class='muted'>Spend ${rp(e.metrics.spend)} | CTR ${pct(e.metrics.ctr)} | CPM ${rp(e.metrics.cpm)} | Freq ${fmt(e.metrics.freq)} | CPA ${rp(e.metrics.cpa)} | ROAS ${fmt(e.metrics.roas)}</div>
            <p><b>Diagnosis:</b> ${e.diagnosis}<br><b>Action:</b> ${e.action}</p>
            <div class='card' style='background:#f8fafc'>
              <b>Detail optimasi yang disarankan</b>
              <ol style='margin:8px 0 0 18px'>
                ${optimizationChecklist(e).map(s=>`<li>${s}</li>`).join('')}
              </ol>
            </div>
            <div class='row'>
              <button class='secondary' onclick="openBrief('${e.id}')">Brief Creative</button>
              <button class='secondary' onclick="saveNotePrompt('${e.level}','${(e.name||'').replace(/'/g,"\\'")}')">Catatan</button>
            </div>
          </div>`).join('')}
        `;
      }

      function openBrief(id){
        const found=(STATE.snapshot.entities||[]).find(x=>x.id===id);
        window.__selectedBrief=found||null;
        switchTab('Brief');
      }

      async function saveNotePrompt(level,name){
        const val=prompt(`Catatan untuk ${name}`, '');
        if(val===null) return;
        await gsr('uiSaveNote',{entity_level:level,entity_name:name,note_text:val});
        await loadSnapshot();
        render();
      }

      function renderBrief(el){
        const e=window.__selectedBrief || (STATE.snapshot.entities||[])[0];
        const briefs=e?.briefs||[];
        el.innerHTML=`<div class='card'><h3>${e?e.name:'-'}</h3>
          ${briefs.map(b=>`<p><b>Problem:</b> ${b.problem}<br><b>Root Cause:</b> ${b.root_cause}<br><b>Angles:</b> ${(b.angles||[]).join(', ')}<br><b>Hook Note:</b> ${b.hook_note}<br><b>Format:</b> ${b.format}</p>`).join('')}
        </div>`;
      }

      function renderPeriode(el){
        el.innerHTML=`
          <div class='card'>
            <div class='row'>
              <select id='cmpLevel'><option value='campaign'>Campaign</option><option value='adset'>Ad Set</option><option value='ad'>Ad</option></select>
              <input type='file' id='csvA' accept='.csv' />
              <input type='file' id='csvB' accept='.csv' />
              <button onclick='runCompare()'>Bandingkan</button>
            </div>
          </div>
          <table class='table'><thead><tr><th>Entity</th><th>ROAS A</th><th>ROAS B</th><th>Delta ROAS%</th><th>CTR A</th><th>CTR B</th><th>Delta CTR%</th><th>CPA A</th><th>CPA B</th><th>Delta CPA%</th></tr></thead>
          <tbody>${STATE.compareRows.map(r=>`<tr><td>${r.name}</td><td>${fmt(r.roas_a)}</td><td>${fmt(r.roas_b)}</td><td>${pct(r.delta_roas_pct)}</td><td>${pct(r.ctr_a)}</td><td>${pct(r.ctr_b)}</td><td>${pct(r.delta_ctr_pct)}</td><td>${rp(r.cpa_a)}</td><td>${rp(r.cpa_b)}</td><td>${pct(r.delta_cpa_pct)}</td></tr>`).join('')}</tbody></table>
        `;
      }

      async function runCompare(){
        const a=(document.getElementById('csvA').files||[])[0];
        const b=(document.getElementById('csvB').files||[])[0];
        if(!a||!b) return alert('Upload CSV A dan B');
        const level=document.getElementById('cmpLevel').value;
        const csvA=await a.text();
        const csvB=await b.text();
        const r=await gsr('uiComparePeriods',{level,csv_a:csvA,csv_b:csvB});
        STATE.compareRows=r.rows||[];
        renderPeriode(document.getElementById('content'));
      }

      function renderAlert(el){
        const rows=(STATE.snapshot.entities||[]).flatMap(e=>(e.alerts||[]).map(a=>({...a,name:e.name,level:e.level})));
        el.innerHTML=`<div class='card'><h3>Daftar Alert</h3><table class='table'><thead><tr><th>Entity</th><th>Level</th><th>Metric</th><th>Nilai</th><th>Threshold</th><th>Severity</th></tr></thead><tbody>
          ${rows.map(r=>`<tr><td>${r.name}</td><td>${r.level}</td><td>${r.metric}</td><td>${fmt(r.value)}</td><td>${r.threshold}</td><td>${r.severity}</td></tr>`).join('')}
        </tbody></table></div>`;
      }

      function renderHierarki(el){
        const h=STATE.snapshot.hierarchy||{};
        const names=Object.keys(h);
        if(!names.length){
          el.innerHTML="<div class='empty'>Hierarki kosong. Pastikan data campaign/adset/ad sudah terimport.</div>";
          return;
        }

        const selected=STATE.hierarchyCampaign||'ALL';
        const options=['ALL'].concat(names).map(n=>`<option value='${n.replace(/'/g,"&#39;")}' ${selected===n?'selected':''}>${n==='ALL'?'Semua Campaign':n}</option>`).join('');
        const filteredNames=selected==='ALL' ? names : names.filter(n=>n===selected);
        const blocks=filteredNames.map(cn=>{
          const c=h[cn]||{};
          const adsetNames=Object.keys(c.adsets||{});
          const adsets=adsetNames.map(n=>{
            const node=c.adsets[n]||{ads:[]};
            const ads=(node.ads||[]).filter(a=>!isOffRow(a));
            const adsHtml=ads.length
              ? ads.map(a=>`<div class='muted'>Ad: ${a.ad_name||'(tanpa nama)'} | Spend ${rp(a.spend)} | ROAS ${fmt(a.roas)}</div>`).join('')
              : "<div class='muted'>Tidak ada ad aktif pada ad set ini.</div>";
            return `<details class='card' style='margin-top:8px'><summary><b>Ad Set: ${n}</b> <span class='muted'>(${ads.length} ad aktif)</span></summary>${adsHtml}</details>`;
          }).join('');
          const orphanAds=(c.orphanAds||[]).filter(a=>!isOffRow(a));
          const orphan=orphanAds.length
            ? `<div class='card' style='margin-top:8px'><b>Orphan Ads</b>${orphanAds.map(a=>`<div class='muted'>Ad: ${a.ad_name||'(tanpa nama)'} | Spend ${rp(a.spend)} | ROAS ${fmt(a.roas)}</div>`).join('')}</div>`
            : '';
          const emptyState=(!adsetNames.length && !orphanAds.length) ? "<div class='muted' style='margin-top:8px'>Campaign ini belum punya data aktif di level ad set/ad.</div>" : '';
          return `<details class='card' open><summary><b>Campaign: ${cn}</b> <span class='muted'>(${adsetNames.length} ad set)</span></summary>${adsets}${orphan}${emptyState}</details>`;
        }).join('');

        el.innerHTML=`
          <div class='row' style='margin-bottom:10px'>
            <label>Filter campaign</label>
            <select onchange="STATE.hierarchyCampaign=this.value;renderHierarki(document.getElementById('content'))">${options}</select>
          </div>
          ${blocks || "<div class='empty'>Campaign terpilih tidak memiliki data aktif untuk ditampilkan.</div>"}
        `;
      }

      function renderAnalitik(el){
        const metricOptions=['roas','ctr','cpa','spend','cpm'];
        const selected=window.__metric || 'roas';
        const rows=activeEntities('campaign');
        if(!rows.length){
          el.innerHTML="<div class='empty'>Belum ada campaign aktif untuk analitik. Data nilai 0 (iklan off) tidak ditampilkan.</div>";
          return;
        }
        const max=Math.max(1,...rows.map(r=>Number(r.metrics[selected]||0)));
        el.innerHTML=`<div class='row'><label>Metric</label><select onchange="window.__metric=this.value;renderAnalitik(document.getElementById('content'))">${metricOptions.map(m=>`<option ${selected===m?'selected':''}>${m}</option>`).join('')}</select></div>
        ${rows.map(r=>`<div class='card'><div class='row'><b>${r.name}</b><span class='badge ${prioCls(r.priority)}'>${r.priority||'N/A'}</span><span class='muted'>${selected.toUpperCase()}: ${fmt(r.metrics[selected])}</span></div><div class='bar'><span style='width:${Math.min(100,(r.metrics[selected]/max)*100)}%'></span></div><div class='muted'>Spend ${rp(r.metrics.spend)} vs Revenue ${rp(r.metrics.revenue)}</div><div class='card' style='background:#f8fafc;margin-top:8px'><b>Keterangan optimasi</b><div class='muted'>${analyticOptimizationNote(r, selected)}</div></div></div>`).join('')}`;
      }

      function renderAI(el){
        el.innerHTML=`<div class='card'>
          <h3>AI Analyzer</h3>
          <div class='muted'>Contoh pertanyaan: Ad mana yang harus dipause hari ini? • Creative mana yang bisa discale sekarang? • Di mana kebocoran budget terbesar?</div>
          <textarea id='aiQ' placeholder='Tulis pertanyaan Anda...'></textarea>
          <div class='row'><button onclick='askAi()'>Analisa</button></div>
          <pre id='aiAns' class='card muted'></pre>
        </div>`;
      }

      async function askAi(){
        const q=document.getElementById('aiQ').value.trim();
        if(!q) return alert('Isi pertanyaan dulu');
        document.getElementById('aiAns').textContent='Memproses...';
        const r=await gsr('uiAskAi',{question:q});
        document.getElementById('aiAns').textContent=r.answer||'Tidak ada jawaban';
      }

      function renderImport(el){
        el.innerHTML=`<div class='card'><h3>Import CSV Meta Ads</h3>
          <div class='row'><select id='impLevel'><option value='campaign'>Campaign</option><option value='adset'>Ad Set</option><option value='ad'>Ad</option></select>
          <input id='periodLabel' placeholder='Period label (contoh: 2026-04-01 s/d 2026-04-07)' style='min-width:320px' />
          <input id='sheetName' placeholder='Nama worksheet (opsional, untuk .xlsx)' style='min-width:240px' />
          <input type='file' id='impCsv' accept='.csv,.xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' /><button onclick='runImport()'>Upload</button></div>
          <div class='muted'>Upload terpisah per level: campaign/adset/ad. Mendukung CSV dan Excel (.xlsx).</div>
        </div>`;
      }

      async function runImport(){
        const file=(document.getElementById('impCsv').files||[])[0];
        if(!file) return alert('Pilih file CSV atau XLSX');
        const level=document.getElementById('impLevel').value;
        const periodLabel=document.getElementById('periodLabel').value||'';
        const worksheetName=(document.getElementById('sheetName').value||'').trim();
        const isXlsx = /\.xlsx$/i.test(file.name) || (file.type||'').indexOf('spreadsheetml') >= 0;
        const payload = { level, file_name:file.name, period_label:periodLabel, worksheet_name:worksheetName };

        try {
          if (isXlsx) {
            const buffer = await file.arrayBuffer();
            payload.file_type = 'xlsx';
            payload.excel_base64 = arrayBufferToBase64_(buffer);
          } else {
            payload.file_type = 'csv';
            payload.csv_text = await file.text();
          }
        } catch (_readErr) {
          return alert('Gagal membaca file. Pastikan file tidak corrupt dan coba lagi.');
        }

        let r;
        try {
          r = await gsr('uiImportCsv', payload);
        } catch (_apiErr) {
          return alert('Import gagal karena koneksi ke Apps Script/Sheets bermasalah. Coba beberapa saat lagi.');
        }
        if(!r.ok) return alert(r.error||'Import gagal');
        alert(`Import sukses: ${r.row_count} baris`);
        await loadSnapshot();
        STATE.tab='Rekomendasi';
        renderTabs();
        render();
      }

      function arrayBufferToBase64_(buffer){
        const bytes = new Uint8Array(buffer);
        let binary = '';
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          const slice = bytes.subarray(i, i + chunk);
          binary += String.fromCharCode.apply(null, slice);
        }
        return btoa(binary);
      }

      function renderSettings(el){
        const cfg = STATE.systemConfig || { WORKER_URL:'', AI_MODE:'ad-analysis-mini', APP_ALLOWED_DOMAIN:'', has_worker_token:false, has_signing_secret:false };
        const ai = STATE.aiConfig || {provider:'builtin',has_openai_key:false,has_gemini_key:false,has_claude_key:false};
        el.innerHTML=`<div class='card'>
          <h3>Settings</h3>

          <h4>Konfigurasi AI Pribadi (Per User)</h4>
          <div class='muted'>Opsional: API key tidak wajib. Jika kosong, sistem otomatis pakai mode bawaan agar fitur tetap jalan normal.</div>
          <div class='grid'>
            <div>
              <div class='muted'>Provider Aktif</div>
              <select id='aiProvider'>
                <option value='builtin' ${ai.provider==='builtin'?'selected':''}>Mode Bawaan (tanpa API)</option>
                <option value='openai' ${ai.provider==='openai'?'selected':''}>OpenAI</option>
                <option value='gemini' ${ai.provider==='gemini'?'selected':''}>Gemini</option>
                <option value='claude' ${ai.provider==='claude'?'selected':''}>Claude</option>
              </select>
            </div>
            <div>
              <div class='muted'>OpenAI API Key</div>
              <input id='aiOpenAiKey' type='password' placeholder='sk-...' style='width:100%' />
              <div class='muted'>Status: ${ai.has_openai_key ? `Tersimpan (${ai.openai_key_masked || '****'})` : 'Belum diisi'}</div>
            </div>
            <div>
              <div class='muted'>Gemini API Key</div>
              <input id='aiGeminiKey' type='password' placeholder='AIza...' style='width:100%' />
              <div class='muted'>Status: ${ai.has_gemini_key ? `Tersimpan (${ai.gemini_key_masked || '****'})` : 'Belum diisi'}</div>
            </div>
            <div>
              <div class='muted'>Claude API Key</div>
              <input id='aiClaudeKey' type='password' placeholder='sk-ant-...' style='width:100%' />
              <div class='muted'>Status: ${ai.has_claude_key ? `Tersimpan (${ai.claude_key_masked || '****'})` : 'Belum diisi'}</div>
            </div>
          </div>
          <div class='row' style='margin-top:10px'>
            <button onclick='saveAiConfig()'>Simpan Konfigurasi AI</button>
          </div>

          <hr style='margin:16px 0;border:none;border-top:1px solid #e5e7eb' />
          <h4>Konfigurasi Sistem</h4>
          ${!STATE.isAdmin ? `<div class='muted'>Anda bukan admin. Konfigurasi sistem hanya bisa dilihat/diubah oleh admin.</div>` : ''}
          <div class='grid'>
            <div><div class='muted'>WORKER_URL</div><input id='setWorkerUrl' value='${cfg.WORKER_URL||''}' style='width:100%' ${STATE.isAdmin?'':'disabled'}/></div>
            <div><div class='muted'>WORKER_TOKEN</div><input id='setWorkerToken' type='password' placeholder='Isi hanya jika ingin update' style='width:100%' ${STATE.isAdmin?'':'disabled'}/><div class='muted'>Status: ${cfg.has_worker_token ? `Tersimpan (${cfg.worker_token_masked || '***'})` : 'Belum diisi'}</div></div>
            <div><div class='muted'>WORKER_SIGNING_SECRET (opsional)</div><input id='setWorkerSigningSecret' type='password' placeholder='Isi hanya jika ingin update' style='width:100%' ${STATE.isAdmin?'':'disabled'}/><div class='muted'>Status: ${cfg.has_signing_secret ? `Tersimpan (${cfg.signing_secret_masked || '***'})` : 'Belum diisi'}</div></div>
            <div><div class='muted'>AI_MODE</div><input id='setAiMode' value='${cfg.AI_MODE||'ad-analysis-mini'}' style='width:100%' ${STATE.isAdmin?'':'disabled'}/></div>
            <div><div class='muted'>APP_ALLOWED_DOMAIN</div><input id='setAllowedDomain' value='${cfg.APP_ALLOWED_DOMAIN||''}' placeholder='contoh: cepat.top' style='width:100%' ${STATE.isAdmin?'':'disabled'}/></div>
          </div>
          <div class='row' style='margin-top:10px'>
            <button onclick='saveSettings()' ${STATE.isAdmin?'':'disabled'}>Simpan Settings</button>
            <button class='secondary' onclick='saveThresholds()' ${STATE.isAdmin?'':'disabled'}>Simpan Threshold</button>
            <button class='secondary' onclick='resetData()' ${STATE.isAdmin?'':'disabled'}>Reset Data</button>
          </div>
          <h4>Threshold</h4>
          <div id='thRows'>${(STATE.snapshot.thresholds||[]).map((t,i)=>`<div class='row' data-idx='${i}'><input value='${t.metric_key}' disabled><select class='th-enabled'><option value='true' ${String(t.enabled)==='true'?'selected':''}>true</option><option value='false' ${String(t.enabled)==='false'?'selected':''}>false</option></select><select class='th-rule'><option value='min' ${t.rule_type==='min'?'selected':''}>min</option><option value='max' ${t.rule_type==='max'?'selected':''}>max</option></select><input class='th-value' value='${t.value}'><input class='th-label' value='${t.label}'></div>`).join('')}</div>
        </div>`;
      }

      async function saveSettings(){
        if(!STATE.isAdmin) return alert('Hanya admin yang bisa ubah konfigurasi sistem.');
        const items=[
          {key_name:'WORKER_URL',key_value:document.getElementById('setWorkerUrl').value.trim()},
          {key_name:'WORKER_TOKEN',key_value:document.getElementById('setWorkerToken').value.trim()},
          {key_name:'WORKER_SIGNING_SECRET',key_value:document.getElementById('setWorkerSigningSecret').value.trim()},
          {key_name:'AI_MODE',key_value:document.getElementById('setAiMode').value.trim()},
          {key_name:'APP_ALLOWED_DOMAIN',key_value:document.getElementById('setAllowedDomain').value.trim()}
        ];
        await gsr('uiSaveSettings',{items});
        await loadSnapshot();
        await loadSystemConfig();
        render();
        alert('Settings tersimpan');
      }

      async function saveAiConfig(){
        const provider = document.getElementById('aiProvider').value;
        const openaiKey = document.getElementById('aiOpenAiKey').value.trim();
        const geminiKey = document.getElementById('aiGeminiKey').value.trim();
        const claudeKey = document.getElementById('aiClaudeKey').value.trim();

        const r = await gsr('uiSaveAiConfig', {
          provider,
          openai_key: openaiKey,
          gemini_key: geminiKey,
          claude_key: claudeKey
        });
        if (!r.ok) return alert(r.error || 'Gagal menyimpan konfigurasi AI');

        await loadAiConfig();
        render();
        alert('Konfigurasi AI per-user tersimpan. Jika API key kosong, mode bawaan akan dipakai otomatis.');
      }

      async function saveThresholds(){
        if(!STATE.isAdmin) return alert('Hanya admin yang bisa ubah threshold.');
        const base=STATE.snapshot.thresholds||[];
        const rows=[...document.querySelectorAll('#thRows .row')];
        const items=rows.map((r,i)=>({
          metric_key:base[i].metric_key,
          enabled:r.querySelector('.th-enabled').value,
          rule_type:r.querySelector('.th-rule').value,
          value:Number(r.querySelector('.th-value').value||0),
          label:r.querySelector('.th-label').value
        }));
        await gsr('uiSaveThresholds',{items});
        await loadSnapshot();render();alert('Threshold tersimpan');
      }

      async function resetData(){
        if(!STATE.isAdmin) return alert('Hanya admin yang bisa reset data.');
        if(!confirm('Reset data campaigns/adsets/ads/notes/import_logs?')) return;
        await gsr('uiResetData');
        await loadSnapshot();
        STATE.tab='Dashboard';
        renderTabs();render();
      }

      Object.assign(window, { switchTab, openBrief, saveNotePrompt, runCompare, askAi, runImport, saveSettings, saveAiConfig, saveThresholds, resetData });
      init().catch(err=>{document.getElementById('content').innerHTML=`<div class="empty">Error: ${err.message}</div>`});
    </script>
  </body>
</html>
